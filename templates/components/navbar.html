{# active_page: 'home' | 'dashboard' — set from each route's render_template call #}
{% set current = active_page|default('') %}

<header class="tactical-nav">
    <div class="container tactical-nav__inner">

        <a class="tactical-nav__brand" href="{{ url_for('home') }}">
            <span class="tactical-nav__logo" aria-hidden="true"></span>
            <span class="tactical-nav__title">
                <span class="tactical-nav__title-main">WR-YOLO</span><span class="tactical-nav__title-sub"> / Tactical</span>
            </span>
        </a>

        <nav class="tactical-nav__links" aria-label="Primary">
            <a class="tactical-nav__link{% if current == 'home' %} is-active{% endif %}"
               href="{{ url_for('home') }}">HOME</a>
            <a class="tactical-nav__link{% if current == 'dashboard' %} is-active{% endif %}"
               href="{{ url_for('dashboard') }}">DASHBOARD</a>
        </nav>

        <div class="tactical-nav__status" title="Localhost server">
            <span class="tactical-nav__status-dot" aria-hidden="true"></span>
            <span class="tactical-nav__status-text">LOCAL · 127.0.0.1</span>
        </div>

    </div>
</header>
